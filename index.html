<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8fafc">
<title>Push &amp; Pull Tracker</title>
<script>
// ---------------------------------------------------------------------------
// Config: per-exercise rep bounds. Reps in every set stay within [min, max].
// ---------------------------------------------------------------------------
const EX = {
  pushups: { name: "Push-ups", emoji: "💪", min: 8, max: 12 },
  pullups: { name: "Pull-ups", emoji: "🦾", min: 4, max: 6 },
};
const KEY = "pushpull.v1";

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)); }
  catch (e) { return null; }
}
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }
function wipe() { localStorage.removeItem(KEY); }

// ---------------------------------------------------------------------------
// Core algorithm
// ---------------------------------------------------------------------------
// Split `total` reps across `sets` as evenly as possible, larger sets first.
// e.g. distribute(31, 3) -> [11, 10, 10]
function distribute(total, sets) {
  const base = Math.floor(total / sets);
  const rem = total % sets;
  const out = [];
  for (let i = 0; i < sets; i++) out.push(i < rem ? base + 1 : base);
  return out;
}

// Advance one exercise by +1 total rep, adding a set if the cap is exceeded.
function advance(ex, key) {
  ex.total += 1;
  if (ex.total > ex.sets * EX[key].max) ex.sets += 1;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
let state = null;

function render() {
  state = load();
  document.getElementById("setup").style.display = state ? "none" : "block";
  document.getElementById("main").style.display = state ? "block" : "none";
  if (state) renderMain();
}

function renderMain() {
  const key = state.current;
  const other = key === "pushups" ? "pullups" : "pushups";
  const meta = EX[key];
  const ex = state[key];
  const plan = distribute(ex.total, ex.sets);

  document.getElementById("todayEmoji").textContent = meta.emoji;
  document.getElementById("todayName").textContent = meta.name;
  document.getElementById("workoutNum").textContent = "Workout #" + state.workout;

  document.getElementById("plan").innerHTML =
    plan.map(n => `<div class="rep">${n}</div>`).join("");

  document.getElementById("summary").textContent =
    `${ex.sets} sets · ${ex.total} reps total`;

  document.getElementById("nextHint").textContent =
    `Next up: ${EX[other].emoji} ${EX[other].name}`;
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
function startPlan() {
  const puTotal = clampPos(+document.getElementById("pu_sets").value) *
                  clampPos(+document.getElementById("pu_reps").value);
  const plTotal = clampPos(+document.getElementById("pl_sets").value) *
                  clampPos(+document.getElementById("pl_reps").value);
  const s = {
    pushups: { total: puTotal, sets: neededSets(puTotal, "pushups") },
    pullups: { total: plTotal, sets: neededSets(plTotal, "pullups") },
    current: document.getElementById("first").value,
    workout: 1,
  };
  save(s);
  render();
}

function clampPos(v) { return Math.max(1, v || 1); }

// Fewest sets that keep every set within [min, max] for the given total.
function neededSets(total, key) {
  return Math.max(1, Math.ceil(total / EX[key].max));
}

function completeWorkout() {
  const key = state.current;
  advance(state[key], key);
  state.current = key === "pushups" ? "pullups" : "pushups";
  state.workout += 1;
  save(state);
  renderMain();
  // brief confirmation pulse
  const btn = document.getElementById("doneBtn");
  btn.classList.add("pulse");
  setTimeout(() => btn.classList.remove("pulse"), 400);
}

function resetAll() {
  if (confirm("Reset all progress and start over?")) { wipe(); render(); }
}

window.addEventListener("DOMContentLoaded", render);
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --card: #ffffff; --ink: #0f172a;
    --muted: #64748b; --accent: #0284c7; --accent2: #16a34a;
    --line: #e2e8f0; --chip: #f1f5f9;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wrap { width: 100%; max-width: 420px; }
  h1 { font-size: 20px; text-align: center; margin-bottom: 4px; letter-spacing: -0.02em; }
  .tag { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .card {
    background: var(--card); border-radius: 20px; padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(15,23,42,0.08); border: 1px solid var(--line);
  }

  /* main screen */
  .today { text-align: center; }
  .emoji { font-size: 48px; line-height: 1; }
  .name { font-size: 28px; font-weight: 700; margin: 8px 0 2px; letter-spacing: -0.02em; }
  .wnum { color: var(--muted); font-size: 13px; }

  .plan {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin: 26px 0 14px;
  }
  .rep {
    background: var(--chip); color: var(--accent);
    font-size: 30px; font-weight: 700;
    width: 68px; height: 68px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }
  .summary { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  button {
    width: 100%; border: none; border-radius: 14px; cursor: pointer;
    font-size: 16px; font-weight: 600; padding: 16px; color: #052e16;
    background: var(--accent2); transition: transform .08s, filter .15s;
  }
  button:hover { filter: brightness(1.05); }
  button:active { transform: scale(0.98); }
  .pulse { animation: pop .4s ease; }
  @keyframes pop { 50% { transform: scale(1.03); filter: brightness(1.15); } }

  .next { text-align: center; color: var(--muted); font-size: 13px; margin-top: 16px; }
  .reset {
    display: block; text-align: center; color: var(--muted); font-size: 12px;
    background: none; margin-top: 18px; padding: 6px; text-decoration: underline; width: auto;
  }
  .reset:hover { color: var(--ink); }

  /* setup screen */
  .grp { margin-bottom: 20px; }
  .grp h2 { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .row { display: flex; gap: 12px; }
  .field { flex: 1; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--chip); color: var(--ink); font-size: 16px;
  }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .divider { height: 1px; background: var(--line); margin: 4px 0 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Push &amp; Pull Tracker</h1>
  <div class="tag">Alternating workouts · +1 rep every time</div>

  <!-- SETUP -->
  <div id="setup" class="card" style="display:none">
    <div class="grp">
      <h2>💪 Push-ups</h2>
      <div class="row">
        <div class="field">
          <label>Sets</label>
          <input id="pu_sets" type="number" inputmode="numeric" min="1" max="20" value="3">
        </div>
        <div class="field">
          <label>Reps per set</label>
          <input id="pu_reps" type="number" inputmode="numeric" min="1" value="10">
        </div>
      </div>
      <div class="hint">Enter what you actually do — the plan re-splits so every set is 8–12.</div>
    </div>

    <div class="grp">
      <h2>🦾 Pull-ups</h2>
      <div class="row">
        <div class="field">
          <label>Sets</label>
          <input id="pl_sets" type="number" inputmode="numeric" min="1" max="20" value="3">
        </div>
        <div class="field">
          <label>Reps per set</label>
          <input id="pl_reps" type="number" inputmode="numeric" min="1" value="5">
        </div>
      </div>
      <div class="hint">Enter what you actually do — the plan re-splits so every set is 4–6.</div>
    </div>

    <div class="divider"></div>
    <div class="grp">
      <label>Start with</label>
      <select id="first">
        <option value="pushups">💪 Push-ups</option>
        <option value="pullups">🦾 Pull-ups</option>
      </select>
    </div>

    <button onclick="startPlan()">Start plan →</button>
  </div>

  <!-- MAIN -->
  <div id="main" class="card" style="display:none">
    <div class="today">
      <div class="emoji" id="todayEmoji"></div>
      <div class="name" id="todayName"></div>
      <div class="wnum" id="workoutNum"></div>
    </div>
    <div class="plan" id="plan"></div>
    <div class="summary" id="summary"></div>
    <button id="doneBtn" onclick="completeWorkout()">Complete workout ✓</button>
    <div class="next" id="nextHint"></div>
    <button class="reset" onclick="resetAll()">Reset progress</button>
  </div>
</div>
</body>
</html>
