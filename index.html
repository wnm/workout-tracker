<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8fafc">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Push &amp; Pull">
<title>Push &amp; Pull Tracker</title>
<script>
// ---------------------------------------------------------------------------
// Config: per-exercise rep bounds. Reps in every set stay within [min, max].
// ---------------------------------------------------------------------------
const EX = {
  pushups: { name: "Push-ups", emoji: "💪", min: 8, max: 20, color: "#0284c7" },
  pullups: { name: "Pull-ups", emoji: "🦾", min: 4, max: 8, color: "#ea580c" },
};
const KEY = "pushpull.v1";

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)); }
  catch (e) { return null; }
}
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }
function wipe() { localStorage.removeItem(KEY); }

// ---------------------------------------------------------------------------
// Core algorithm
// ---------------------------------------------------------------------------
// Split `total` reps across `sets` as evenly as possible, larger sets first.
// e.g. distribute(31, 3) -> [11, 10, 10]
function distribute(total, sets) {
  const base = Math.floor(total / sets);
  const rem = total % sets;
  const out = [];
  for (let i = 0; i < sets; i++) out.push(i < rem ? base + 1 : base);
  return out;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
let state = null;
let view = "main"; // "main" | "progress"  — always resets to "main" on load

function show(id) {
  ["setup", "main", "progress"].forEach(v => {
    document.getElementById(v).style.display = v === id ? "block" : "none";
  });
}

// Re-split each exercise to the fewest sets its current cap allows. Keeps the
// stored plan consistent when the rep cap changes (e.g. push-ups 12 -> 20),
// so a raised cap applies right away instead of only after the next workout.
function migrate() {
  let changed = false;
  ["pushups", "pullups"].forEach(key => {
    const ex = state[key];
    if (!ex) return;
    const want = neededSets(ex.total, key);
    if (ex.sets !== want) {
      ex.sets = want;
      changed = true;
      if (state.pending && state.pending.ex === key &&
          Array.isArray(state.pending.reps) && state.pending.reps.length !== want) {
        state.pending = null; // stale working plan; rebuilt on next render
      }
    }
  });
  if (changed) save(state);
}

function render() {
  state = load();
  if (!state) { show("setup"); return; }
  migrate();
  if (view === "progress") { show("progress"); renderProgress(); }
  else { show("main"); renderMain(); }
}

function showProgress() { view = "progress"; render(); }
function showMain() { view = "main"; render(); }

// The working plan for the current workout. Starts from the proposal
// (one more than last time) but the user can nudge each set up/down.
// Persisted as state.pending so edits survive a reload.
function ensurePending() {
  const key = state.current;
  const p = state.pending;
  if (!(p && p.ex === key && Array.isArray(p.reps))) {
    const reps = distribute(state[key].total, state[key].sets);
    state.pending = { ex: key, reps, done: reps.map(() => false) };
    save(state);
  } else if (!Array.isArray(p.done) || p.done.length !== p.reps.length) {
    p.done = p.reps.map(() => false);
    save(state);
  }
  return state.pending;
}

function currentPlan() { return ensurePending().reps; }

function adjustRep(i, delta) {
  const meta = EX[state.current];
  const p = ensurePending();
  p.reps[i] = Math.max(meta.min, Math.min(meta.max, p.reps[i] + delta));
  save(state);
  renderMain();
}

// Tap a set number to mark it done (green border) while working out.
function toggleDone(i) {
  const p = ensurePending();
  p.done[i] = !p.done[i];
  save(state);
  renderMain();
}

function renderMain() {
  const key = state.current;
  const other = key === "pushups" ? "pullups" : "pushups";
  const meta = EX[key];
  const p = ensurePending();
  const plan = p.reps, done = p.done;

  document.getElementById("todayEmoji").textContent = meta.emoji;
  document.getElementById("todayName").textContent = meta.name;
  document.getElementById("workoutNum").textContent = "Workout #" + state.workout;

  document.getElementById("plan").innerHTML = plan.map((n, i) => `
    <div class="repcol">
      <button class="arrow" onclick="adjustRep(${i},1)" ${n >= meta.max ? "disabled" : ""} aria-label="increase">▲</button>
      <div class="rep${done[i] ? " done" : ""}" onclick="toggleDone(${i})">${n}</div>
      <button class="arrow" onclick="adjustRep(${i},-1)" ${n <= meta.min ? "disabled" : ""} aria-label="decrease">▼</button>
    </div>`).join("");

  const total = plan.reduce((a, b) => a + b, 0);
  document.getElementById("summary").textContent =
    `${plan.length} sets · ${total} reps total`;

  // Complete is only allowed once every set is tapped done.
  const doneCount = done.filter(Boolean).length;
  const allDone = doneCount === done.length;
  const btn = document.getElementById("doneBtn");
  btn.disabled = !allDone;
  btn.textContent = allDone
    ? "Complete workout ✓"
    : `Tap each set when done · ${doneCount}/${done.length}`;

  document.getElementById("nextHint").textContent =
    `Next up: ${EX[other].emoji} ${EX[other].name}`;
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
function startPlan() {
  const puTotal = clampPos(+document.getElementById("pu_sets").value) *
                  clampPos(+document.getElementById("pu_reps").value);
  const plTotal = clampPos(+document.getElementById("pl_sets").value) *
                  clampPos(+document.getElementById("pl_reps").value);
  const s = {
    pushups: { total: puTotal, sets: neededSets(puTotal, "pushups") },
    pullups: { total: plTotal, sets: neededSets(plTotal, "pullups") },
    current: document.getElementById("first").value,
    workout: 1,
  };
  save(s);
  render();
}

function clampPos(v) { return Math.max(1, v || 1); }

// Fewest sets that keep every set within [min, max] for the given total.
function neededSets(total, key) {
  return Math.max(1, Math.ceil(total / EX[key].max));
}

function completeWorkout() {
  const key = state.current;
  const reps = currentPlan();               // what the user actually logged
  const actual = reps.reduce((a, b) => a + b, 0);

  // Record the session as performed.
  if (!state.history) state.history = [];
  state.history.push({ t: Date.now(), ex: key, sets: reps.length, total: actual, reps });

  // Next time, propose one more than what was actually done last time.
  const next = actual + 1;
  state[key] = { total: next, sets: neededSets(next, key) };
  state.current = key === "pushups" ? "pullups" : "pushups";
  state.workout += 1;
  state.pending = null;                      // clear working edits for the next exercise
  save(state);
  renderMain();
  // brief confirmation pulse
  const btn = document.getElementById("doneBtn");
  btn.classList.add("pulse");
  setTimeout(() => btn.classList.remove("pulse"), 400);
}

function resetAll() {
  if (confirm("Reset all progress and start over?")) { view = "main"; wipe(); render(); }
}

// ---------------------------------------------------------------------------
// Progress page
// ---------------------------------------------------------------------------
const nf = n => n.toLocaleString();

function fmtDate(t) {
  const d = new Date(t);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
    ", " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

function renderProgress() {
  const hist = state.history || [];

  // Headline stats
  const byEx = k => hist.filter(h => h.ex === k);
  const sum = arr => arr.reduce((a, h) => a + h.total, 0);
  const best = arr => arr.reduce((m, h) => Math.max(m, h.total), 0);
  const pu = byEx("pushups"), pl = byEx("pullups");

  const stats = [
    { label: "Workouts", value: nf(hist.length) },
    { label: "Total reps", value: nf(sum(hist)) },
    { label: "💪 Best", value: pu.length ? nf(best(pu)) : "–" },
    { label: "🦾 Best", value: pl.length ? nf(best(pl)) : "–" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><div class="stat-v">${s.value}</div><div class="stat-l">${s.label}</div></div>`
  ).join("");

  // Chart
  document.getElementById("chart").innerHTML = buildChart(pu, pl);
  document.getElementById("chartLegend").innerHTML = hist.length
    ? `<span class="lg"><i style="background:${EX.pushups.color}"></i>Push-ups · ${nf(sum(pu))} total</span>
       <span class="lg"><i style="background:${EX.pullups.color}"></i>Pull-ups · ${nf(sum(pl))} total</span>`
    : "";

  // History log (newest first)
  const log = [...hist].reverse().map(h => {
    const m = EX[h.ex];
    return `<div class="logrow">
      <div class="logex">${m.emoji}</div>
      <div class="loginfo">
        <div class="logtitle">${m.name} · ${h.total} reps</div>
        <div class="logsub">${h.sets} sets · ${fmtDate(h.t)}</div>
      </div>
      <div class="logtotal">${h.reps.join(" ")}</div>
    </div>`;
  }).join("");
  document.getElementById("log").innerHTML = log ||
    `<div class="empty">No workouts logged yet. Complete one to start your history.</div>`;
}

// Build a two-line SVG chart of per-session totals for each exercise.
function buildChart(pu, pl) {
  const n = Math.max(pu.length, pl.length);
  if (n < 2) {
    return `<div class="empty">Complete a few workouts to see your progress 📈</div>`;
  }
  const W = 320, H = 170, padL = 34, padR = 12, padT = 14, padB = 22;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const all = [...pu, ...pl].map(h => h.total);
  let yMin = Math.min(...all), yMax = Math.max(...all);
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  const xAt = i => padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
  const yAt = v => padT + (1 - (v - yMin) / (yMax - yMin)) * plotH;

  // gridlines + y labels (3 ticks)
  let grid = "";
  for (let k = 0; k <= 2; k++) {
    const v = Math.round(yMin + (k / 2) * (yMax - yMin));
    const y = yAt(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" class="grid"/>`;
    grid += `<text x="${padL - 6}" y="${y + 3}" class="ylab">${v}</text>`;
  }

  const series = (arr, color) => {
    if (!arr.length) return "";
    const pts = arr.map((h, i) => [xAt(i), yAt(h.total)]);
    const path = pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
    const dots = pts.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}"/>`).join("");
    return `<polyline points="${path}" fill="none" stroke="${color}" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>${dots}`;
  };

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    ${grid}
    ${series(pu, EX.pushups.color)}
    ${series(pl, EX.pullups.color)}
  </svg>`;
}

window.addEventListener("DOMContentLoaded", render);
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --card: #ffffff; --ink: #0f172a;
    --muted: #64748b; --accent: #0284c7; --accent2: #16a34a;
    --line: #e2e8f0; --chip: #f1f5f9;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wrap { width: 100%; max-width: 420px; }
  h1 { font-size: 20px; text-align: center; margin-bottom: 4px; letter-spacing: -0.02em; }
  .tag { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .card {
    background: var(--card); border-radius: 20px; padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(15,23,42,0.08); border: 1px solid var(--line);
  }

  /* main screen */
  .today { text-align: center; }
  .emoji { font-size: 48px; line-height: 1; }
  .name { font-size: 28px; font-weight: 700; margin: 8px 0 2px; letter-spacing: -0.02em; }
  .wnum { color: var(--muted); font-size: 13px; }

  .plan {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin: 22px 0 14px;
  }
  .repcol { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .rep {
    background: var(--chip); color: var(--accent);
    font-size: 30px; font-weight: 700;
    width: 68px; height: 68px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--line); cursor: pointer;
    user-select: none; -webkit-user-select: none;
    transition: border-color .12s, background .12s;
  }
  .rep.done {
    border-color: var(--accent2); background: #dcfce7; color: #166534;
  }
  .arrow {
    width: 68px; background: none; color: var(--muted);
    font-size: 13px; font-weight: 400; padding: 5px 0; border-radius: 8px; line-height: 1;
  }
  .arrow:hover { background: var(--chip); color: var(--ink); filter: none; }
  .arrow:active { transform: none; }
  .arrow:disabled { opacity: 0.22; cursor: default; }
  .arrow:disabled:hover { background: none; color: var(--muted); }
  .summary { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  button {
    width: 100%; border: none; border-radius: 14px; cursor: pointer;
    font-size: 16px; font-weight: 600; padding: 16px; color: #052e16;
    background: var(--accent2); transition: transform .08s, filter .15s;
  }
  button:hover { filter: brightness(1.05); }
  button:active { transform: scale(0.98); }
  #doneBtn:disabled { background: var(--chip); color: var(--muted); border: 1px solid var(--line); cursor: default; }
  #doneBtn:disabled:hover { filter: none; }
  #doneBtn:disabled:active { transform: none; }
  .pulse { animation: pop .4s ease; }
  @keyframes pop { 50% { transform: scale(1.03); filter: brightness(1.15); } }

  .next { text-align: center; color: var(--muted); font-size: 13px; margin-top: 16px; }
  .reset {
    display: block; text-align: center; color: var(--muted); font-size: 12px;
    background: none; margin-top: 18px; padding: 6px; text-decoration: underline; width: auto;
  }
  .reset:hover { color: var(--ink); }

  /* setup screen */
  .grp { margin-bottom: 20px; }
  .grp h2 { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .row { display: flex; gap: 12px; }
  .field { flex: 1; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--chip); color: var(--ink); font-size: 16px;
  }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .divider { height: 1px; background: var(--line); margin: 4px 0 20px; }

  /* links under main button */
  .links { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 16px; }
  .links .reset { margin-top: 0; }
  .sep { color: var(--muted); font-size: 12px; }

  /* progress screen */
  .back {
    width: auto; background: none; color: var(--accent); font-size: 14px;
    padding: 0 0 4px; font-weight: 600;
  }
  .back:hover { filter: none; text-decoration: underline; }
  .ptitle { font-size: 22px; margin: 6px 0 18px; letter-spacing: -0.02em; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 22px; }
  .stat { background: var(--chip); border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center; }
  .stat-v { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-l { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .chart { min-height: 60px; }
  .chart .grid { stroke: var(--line); stroke-width: 1; }
  .chart .ylab { fill: var(--muted); font-size: 9px; text-anchor: end; }
  .legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 8px 0 4px; }
  .lg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .lg i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }

  .loghead { font-size: 13px; font-weight: 600; color: var(--muted); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .log { display: flex; flex-direction: column; gap: 8px; }
  .logrow { display: flex; align-items: center; gap: 12px; background: var(--chip); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; }
  .logex { font-size: 22px; }
  .loginfo { flex: 1; min-width: 0; }
  .logtitle { font-size: 14px; font-weight: 600; }
  .logsub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .logtotal { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; max-width: 40%; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Push &amp; Pull Tracker</h1>
  <div class="tag">Alternating workouts · +1 rep every time</div>

  <!-- SETUP -->
  <div id="setup" class="card" style="display:none">
    <div class="grp">
      <h2>💪 Push-ups</h2>
      <div class="row">
        <div class="field">
          <label>Sets</label>
          <input id="pu_sets" type="number" inputmode="numeric" min="1" max="20" value="3">
        </div>
        <div class="field">
          <label>Reps per set</label>
          <input id="pu_reps" type="number" inputmode="numeric" min="1" value="10">
        </div>
      </div>
      <div class="hint">Enter what you actually do — the plan re-splits so every set is 8–12.</div>
    </div>

    <div class="grp">
      <h2>🦾 Pull-ups</h2>
      <div class="row">
        <div class="field">
          <label>Sets</label>
          <input id="pl_sets" type="number" inputmode="numeric" min="1" max="20" value="3">
        </div>
        <div class="field">
          <label>Reps per set</label>
          <input id="pl_reps" type="number" inputmode="numeric" min="1" value="5">
        </div>
      </div>
      <div class="hint">Enter what you actually do — the plan re-splits so every set is 4–6.</div>
    </div>

    <div class="divider"></div>
    <div class="grp">
      <label>Start with</label>
      <select id="first">
        <option value="pushups">💪 Push-ups</option>
        <option value="pullups">🦾 Pull-ups</option>
      </select>
    </div>

    <button onclick="startPlan()">Start plan →</button>
  </div>

  <!-- MAIN -->
  <div id="main" class="card" style="display:none">
    <div class="today">
      <div class="emoji" id="todayEmoji"></div>
      <div class="name" id="todayName"></div>
      <div class="wnum" id="workoutNum"></div>
    </div>
    <div class="plan" id="plan"></div>
    <div class="summary" id="summary"></div>
    <button id="doneBtn" onclick="completeWorkout()">Complete workout ✓</button>
    <div class="next" id="nextHint"></div>
    <div class="links">
      <button class="reset" onclick="showProgress()">See progress</button>
      <span class="sep">·</span>
      <button class="reset" onclick="resetAll()">Reset progress</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress" class="card" style="display:none">
    <button class="back" onclick="showMain()">← Back</button>
    <h2 class="ptitle">Your progress</h2>
    <div class="stats" id="stats"></div>
    <div class="chart" id="chart"></div>
    <div class="legend" id="chartLegend"></div>
    <div class="loghead">Workout history</div>
    <div class="log" id="log"></div>
  </div>
</div>
</body>
</html>
